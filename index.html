<!DOCTYPE html>
<html>
<head>
    <title>Cazando</title>
    <link rel="stylesheet" href="cazando.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body onload="iniciarJuego()">

    <div class="game-wrapper">

        <header class="game-header">
            <h1 class="titulo-glow">CAZANDO</h1>
            <p class="autor">por Alexander Garofalo</p>
        </header>

        <div class="panel">
            <div class="stat-box">
                <span class="stat-label">PUNTOS</span>
                <span class="stat-value" id="puntos">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">TIEMPO</span>
                <span class="stat-value" id="tiempo">15</span>
            </div>
            <button class="btn-reset" onclick="reiniciar()">⟳ RESET</button>
        </div>

        <div class="canvas-container">
            <canvas id="areajuego" width="600" height="400"></canvas>
        </div>

        <div class="controles">
            <button id="btnArriba">↑</button>
            <br>
            <button id="btnIzquierda">←</button>
            <button id="btnAbajo">↓</button>
            <button id="btnDerecha">→</button>
        </div>

        <p class="subtitulo-controles">ATRAPA LA COMIDA</p>
        <p id="mensaje"></p>

    </div>

    <script src="cazando.js"></script>
    <script src="utils.js"></script>

    <!-- Override de imágenes: se ejecuta DESPUÉS de cazando.js, sin modificar ese archivo -->
    <script>
        const imgGato = new Image();
        imgGato.src = "icono_gato.JPG";

        const imgComida = new Image();
        imgComida.src = "icono_comida.JPG";

        // Redefinimos las funciones de dibujo para usar imágenes en lugar de rectángulos
        function graficarGato() {
            ctx.drawImage(imgGato, gatoX, gatoY, ANCHO_GATO, ALTO_GATO);
        }

        function graficarComida() {
            ctx.drawImage(imgComida, comidaX, comidaY, ANCHO_COMIDA, ALTO_COMIDA);
        }

        // Reiniciamos el juego una vez que ambas imágenes estén cargadas
        let imagenesListas = 0;
        function onImagenLista() {
            imagenesListas++;
            if (imagenesListas === 2) {
                iniciarJuego();
            }
        }
        imgGato.onload = onImagenLista;
        imgComida.onload = onImagenLista;
    </script>
</body>
</html>
