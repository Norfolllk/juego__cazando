<!DOCTYPE html>
<html>
<head>
    <title>Cazando</title>
    <link rel="stylesheet" href="cazando.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body onload="iniciarJuego()">

    <div class="game-wrapper">

        <header class="game-header">
            <h1 class="titulo-glow">CAZANDO</h1>
            <p class="autor">por Alexander Garofalo</p>
        </header>

        <div class="panel">
            <div class="stat-box">
                <span class="stat-label">PUNTOS</span>
                <span class="stat-value" id="puntos">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">TIEMPO</span>
                <span class="stat-value" id="tiempo">10</span>
            </div>
            <button class="btn-reset" onclick="reiniciar()">⟳ RESET</button>
        </div>

        <div class="canvas-container">
            <canvas id="areajuego" width="500" height="500"></canvas>
        </div>

        <div class="controles">
            <button id="btnArriba">↑</button>
            <br>
            <button id="btnIzquierda">←</button>
            <button id="btnAbajo">↓</button>
            <button id="btnDerecha">→</button>
        </div>

        <p class="subtitulo-controles">ATRAPA LA COMIDA</p>
        <p id="mensaje"></p>

    </div>

    <script src="cazando.js"></script>
    <script src="utils.js"></script>
</body>
</html>
